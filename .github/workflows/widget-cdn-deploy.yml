name: widget-cdn — build, sign, deploy

# Production builds of `apps/widget-cdn` go through CI so the signing key never
# lives outside `secrets.LAYERSWAP_PRIVATE_KEY_PEM`. The build is uploaded to
# Cloudflare R2 under an immutable per-build prefix and the rolling channel
# pointer (`channels.json`) is flipped to it. The Cloudflare Worker in
# `apps/widget-cdn/worker` serves R2 and 302-redirects `/vN/*` to the current
# build. This workflow is the only path to a production CDN deploy.

on:
  push:
    # `babkenmes/widget-cdn-delivery` is temporary — for testing the full
    # deploy pipeline on the feature branch before merging. Remove it (leaving
    # just `main`) once the CDN is verified end-to-end.
    branches: [main, babkenmes/widget-cdn-delivery]
    paths:
      - 'apps/widget-cdn/**'
      - 'packages/widget/**'
      - 'packages/wallets/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/widget-cdn-deploy.yml'
  workflow_dispatch:
    inputs:
      promote:
        description: 'Flip the rolling channel to this build (uncheck to upload only)'
        type: boolean
        required: false
        default: true
      deploy_worker:
        description: 'Also deploy the Cloudflare Worker (edge router)'
        type: boolean
        required: false
        default: false

concurrency:
  group: widget-cdn-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  # Reserved for an OIDC upgrade path if the signing key moves into KMS later.
  id-token: write
  # Lets the failure alert open/comment a GitHub issue.
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: widget-cdn-production
    env:
      # R2 credentials (an R2 API token scoped to the bucket) + endpoint.
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUCKET || 'layerswap-widget-cdn' }}
      # Promotion defaults to true on push; honors the dispatch toggle otherwise.
      LAYERSWAP_PROMOTE: ${{ (github.event_name == 'workflow_dispatch' && inputs.promote == false) && 'false' || 'true' }}
      # Published builds are immutable, but the buildId embeds the commit sha
      # (see apps/widget-cdn/scripts/build-id.mjs), so every push gets a fresh
      # prefix — only literally re-deploying the SAME commit collides. For that
      # rare case, uncomment the next line. Re-comment afterwards.
      # ALLOW_OVERWRITE: '1'

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # No `version:` — let the action read it from package.json's
      # `packageManager` field, so CI tracks the repo's pinned pnpm exactly.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build:packages

      # Exercise the release-critical build identity, deploy/rollback, SRI,
      # public type, and Worker contracts before the signing key is staged or
      # any artifact can be uploaded to production.
      - name: Test widget release tooling
        run: |
          pnpm --filter @layerswap/widget-cdn test
          pnpm --filter @layerswap/widget-js test
          pnpm --filter @layerswap/widget-react check:types
          pnpm exec tsc -p apps/widget-cdn/worker/tsconfig.json --noEmit

      # Build provenance stamped into the signed manifest.
      - name: Compute build metadata
        run: |
          echo "LAYERSWAP_GIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "LAYERSWAP_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          BUILD_ID=$(node --input-type=module -e "import { resolveBuildIdentity } from './apps/widget-cdn/scripts/build-id.mjs'; process.stdout.write(resolveBuildIdentity('./apps/widget-cdn').buildId)")
          echo "LAYERSWAP_BUILD_ID=${BUILD_ID}" >> "$GITHUB_ENV"

      # Stage the signing key to a tempfile (not argv/env-dump visible). Wiped
      # at job end regardless of outcome.
      - name: Stage signing key
        id: key
        env:
          PEM: ${{ secrets.LAYERSWAP_PRIVATE_KEY_PEM }}
        run: |
          if [ -z "$PEM" ]; then
            echo "::error::secrets.LAYERSWAP_PRIVATE_KEY_PEM is not set."
            exit 1
          fi
          umask 077
          KEY_PATH="$RUNNER_TEMP/layerswap-signing.pem"
          printf '%s\n' "$PEM" > "$KEY_PATH"
          echo "key-path=$KEY_PATH" >> "$GITHUB_OUTPUT"

      - name: Build + sign widget-cdn
        working-directory: apps/widget-cdn
        env:
          LAYERSWAP_PRIVATE_KEY_PEM: ${{ steps.key.outputs.key-path }}
        run: pnpm build

      # Round-trip the signature against the public key bundled into the loader
      # core. Fails the deploy on a key mismatch before anything ships.
      - name: Verify signature against bundled public key
        working-directory: apps/widget-cdn
        run: pnpm verify-manifest

      # Upload the immutable build to R2 and (unless promote=false) flip the
      # rolling channel pointer. Refuses to overwrite an already-published
      # buildId, so re-running a deploy for the same commit is a no-op error
      # rather than a silent clobber — any new commit gets a fresh buildId.
      - name: Upload to R2 + promote channel
        working-directory: apps/widget-cdn
        run: pnpm deploy:r2

      - name: Wipe signing key from runner
        if: always()
        run: rm -f "$RUNNER_TEMP/layerswap-signing.pem"

      # Optional: deploy the edge Worker. Only needed when worker code changes;
      # off by default on push, opt-in via workflow_dispatch.
      - name: Deploy Cloudflare Worker
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_worker == true }}
        working-directory: apps/widget-cdn
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: pnpm worker:deploy

      # End-to-end check against the live CDN: the rolling channel resolves,
      # the manifest is reachable with CORS, signed, and kill-switch off.
      - name: Smoke-test the live channel
        if: ${{ env.LAYERSWAP_PROMOTE != 'false' && vars.CDN_BASE_URL != '' }}
        run: |
          set -euo pipefail
          VERSION=$(node -e "console.log(require('./apps/widget-cdn/node_modules/@layerswap/widget/package.json').version)")
          CHANNEL="v${VERSION%%.*}"
          MANIFEST_URL="${{ vars.CDN_BASE_URL }}/${CHANNEL}/manifest.json"
          echo "Fetching (following redirects) $MANIFEST_URL"
          curl -fsSL -L -H "Origin: https://example.com" -D /tmp/headers "$MANIFEST_URL" -o /tmp/manifest.json
          grep -i 'access-control-allow-origin' /tmp/headers || { echo "::error::CDN missing CORS header"; exit 1; }
          node -e "
            const m = JSON.parse(require('fs').readFileSync('/tmp/manifest.json','utf8'));
            if (!m.signature) { console.error('live manifest has no signature'); process.exit(1); }
            if (m.killSwitch) { console.error('live manifest has killSwitch=true'); process.exit(1); }
            if (m.buildId !== '${LAYERSWAP_BUILD_ID}') { console.error('live channel still on build', m.buildId, '— expected ${LAYERSWAP_BUILD_ID}'); process.exit(1); }
            if (m.version !== '${VERSION}') { console.error('live channel still on', m.version, '— expected ${VERSION}'); process.exit(1); }
            if (m.gitSha !== '${GITHUB_SHA}') { console.error('live channel still on commit', m.gitSha, '— expected ${GITHUB_SHA}'); process.exit(1); }
            console.log('live channel OK  buildId=', m.buildId, ' version=', m.version, ' gitSha=', m.gitSha);
          "

      - name: Summary
        if: always()
        run: |
          VERSION=$(node -e "console.log(require('./apps/widget-cdn/node_modules/@layerswap/widget/package.json').version)" 2>/dev/null || echo "?")
          BUILD_ID=${LAYERSWAP_BUILD_ID:-?}
          {
            echo "## widget-cdn deploy"
            echo ""
            echo "- Build id: \`${BUILD_ID}\`"
            echo "- Version: \`${VERSION}\`"
            echo "- Channel promoted: \`${LAYERSWAP_PROMOTE}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # A failed deploy means the live channel silently keeps serving the
      # previous build — that must never be discovered by noticing stale
      # behavior in the browser. Open a GitHub issue @mentioning the pusher
      # (triggers a GitHub notification/email); if an open deploy-failure
      # issue already exists, comment on it instead of piling up duplicates.
      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./packages/widget/core/package.json').version" 2>/dev/null || echo "?")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TITLE="widget-cdn deploy failed"
          {
            echo "@${{ github.actor }} the widget-cdn deploy failed — the live CDN channel is still serving the **previous** build."
            echo ""
            echo "- Version: \`${VERSION}\`"
            echo "- Branch: \`${GITHUB_REF_NAME}\` @ \`${GITHUB_SHA::7}\`"
            echo "- Run: ${RUN_URL}"
            echo ""
            echo "Check the run log for the failing step. (Build ids embed the commit sha, so an immutability collision only happens when re-deploying the same commit — re-run from a new commit or set \`ALLOW_OVERWRITE=1\`.)"
          } > "$RUNNER_TEMP/alert-body.md"
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --state open \
            --search "\"${TITLE}\" in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body-file "$RUNNER_TEMP/alert-body.md"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body-file "$RUNNER_TEMP/alert-body.md"
          fi
